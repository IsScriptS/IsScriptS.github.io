<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TTD Value List - Trades & Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e17;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #eef2ff;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* TRADE NAV BUTTONS - красивые и закругленные */
        .trade-nav {
            background: #0c0f18;
            padding: 12px 28px;
            border-bottom: 1px solid #1e2335;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .trade-nav-btn {
            background: #1a1f32;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            color: #eef2ff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
        }
        .trade-nav-btn.active {
            background: linear-gradient(135deg, #f5b042, #ffcf7a);
            color: #0b0e17;
            box-shadow: 0 2px 8px rgba(245,176,66,0.3);
        }
        .trade-nav-btn:hover:not(.active) {
            background: #2a2f48;
            transform: translateY(-1px);
        }

        .main-row {
            display: flex;
            flex: 1;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .categories-sidebar {
            width: 260px;
            background: #0c0f18;
            border-right: 1px solid #1e2335;
            flex-shrink: 0;
            height: calc(100vh - 280px);
            position: sticky;
            top: 0;
            overflow-y: auto;
            padding: 24px 0 30px 0;
        }

        .categories-header {
            font-size: 1rem;
            font-weight: 700;
            padding: 0 20px 16px 24px;
            border-bottom: 1px solid #1e2335;
            margin-bottom: 16px;
            color: #b9c3f0;
            letter-spacing: 0.5px;
        }

        .category-item {
            padding: 10px 20px 10px 32px;
            cursor: pointer;
            transition: all 0.12s;
            border-left: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #b0b9dc;
        }

        .category-item:hover {
            background: #13182a;
            border-left-color: #6c7bdb;
            color: white;
        }

        .category-item.active {
            background: #1a1f32;
            border-left-color: #f5b042;
            color: white;
            font-weight: 500;
        }

        .category-icon {
            font-size: 1rem;
        }

        .main-content {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
        }

        .partner-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #2a2e3f;
            padding-bottom: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .partner {
            color: #9aa4bf;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .partner-creator {
            background: #1a1f32;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #f5b042;
        }

        .take-me-there {
            color: #6c7bdb;
            font-weight: 600;
            background: rgba(108, 123, 219, 0.12);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .control-panel {
            background: #10131f;
            border-radius: 24px;
            padding: 16px 22px;
            margin: 16px 0 24px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            justify-content: space-between;
        }

        .search-area input {
            background: #1e2337;
            border: 1px solid #2e354f;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            width: 240px;
            outline: none;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-group select, .filter-group button {
            background: #1a1f31;
            border: 1px solid #2e354f;
            padding: 8px 14px;
            border-radius: 30px;
            color: #e0e6ff;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .sort-by {
            background: #0e1220;
            padding: 6px 16px;
            border-radius: 32px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tier-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff, #aab3e0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: #111522;
            border-radius: 24px;
            padding: 18px 20px;
            border: 1px solid #222838;
            transition: 0.15s;
        }

        .item-card:hover {
            border-color: #4c5a8c;
        }

        .item-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: -0.2px;
        }

        .value-row {
            background: #0c1020;
            border-radius: 16px;
            padding: 10px 14px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .value-label {
            font-size: 0.75rem;
            color: #8d99c6;
        }

        .value-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .value-control button {
            background: #2a2f48;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            width: 32px;
            height: 32px;
            border-radius: 20px;
            cursor: pointer;
        }

        .value-control button:hover {
            background: #4a5a8a;
        }

        .current-value {
            font-size: 1.3rem;
            font-weight: 700;
            min-width: 70px;
            text-align: center;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.75rem;
            border-bottom: 1px dashed #252c40;
        }

        .detail-label {
            color: #8f99c2;
        }

        .detail-value {
            font-weight: 500;
            text-align: right;
        }

        .stability-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .doing-well { background: #2c5f8a; color: #b8e2ff; }
        .stable { background: #2d4059; color: #bedbff; }
        .underpaid { background: #7a5a2c; color: #ffe1a0; }
        .overpaid { background: #2a6b3c; color: #b8ffcf; }

        .no-results {
            text-align: center;
            padding: 60px;
            color: #7a85b0;
            grid-column: 1 / -1;
        }

        .calculator-section {
            background: #0c0f18;
            border-top: 2px solid #1e2335;
            padding: 20px 28px;
            width: 100%;
        }

        .calculator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .calculator-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f5b042, #ffdc97);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .clear-calc-btn {
            background: #6b2e4a;
            border: none;
            color: #ffbcda;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .clear-calc-btn:hover {
            background: #8a3b60;
        }

        .calculator-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
            padding: 8px 4px;
        }

        .calc-unit {
            background: #1a1f32;
            border-radius: 20px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
        }

        .calc-unit-name {
            font-weight: 600;
        }

        .calc-unit-value {
            color: #f5b042;
            font-weight: 700;
        }

        .calc-unit-count {
            background: #2c3550;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ffdc97;
        }

        .remove-unit-btn {
            background: #2a1f2c;
            border: none;
            color: #ffaa88;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .calculator-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid #1e2335;
            font-size: 1.2rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .total-label {
            font-weight: 600;
            color: #b9c3f0;
        }

        .total-value {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5b042, #ffdc97);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .empty-calc {
            color: #6f7aa3;
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            width: 100%;
        }

        /* TRADES PANEL - полностью повторяет стили старого интерфейса */
        .trades-section {
            background: #0b0e17;
            padding: 24px 28px;
            width: 100%;
        }
        .trades-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .trades-header h2 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #f5b042, #ffdc97);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .add-offer-btn {
            background: linear-gradient(135deg, #f5b042, #ffcf7a);
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            color: #0b0e17;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(245,176,66,0.3);
        }
        .add-offer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245,176,66,0.4);
        }
        .trades-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 8px;
        }
        .trade-card {
            background: #111522;
            border-radius: 24px;
            padding: 20px 24px;
            border: 1px solid #222838;
            transition: 0.15s;
        }
        .trade-card:hover {
            border-color: #f5b042;
        }
        .trade-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .trade-desc {
            color: #b9c3f0;
            margin-bottom: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .trade-meta {
            display: flex;
            gap: 24px;
            font-size: 0.7rem;
            color: #8d99c6;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .trade-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .chat-btn, .delete-trade-btn {
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .chat-btn {
            background: #3a4a6e;
            color: white;
        }
        .chat-btn:hover {
            background: #4a6a9e;
            transform: translateY(-1px);
        }
        .delete-trade-btn {
            background: #6b2e4a;
            color: #ffbcda;
        }
        .delete-trade-btn:hover {
            background: #8a3b60;
            transform: translateY(-1px);
        }
        .chat-window {
            margin-top: 18px;
            background: #0a0d16;
            border-radius: 20px;
            padding: 14px;
            border: 1px solid #2e354f;
        }
        .chat-messages {
            max-height: 180px;
            overflow-y: auto;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }
        .chat-msg {
            background: #1a1f32;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            word-break: break-word;
            color: #eef2ff;
        }
        .chat-msg strong {
            color: #f5b042;
        }
        .chat-input-area {
            display: flex;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            background: #1e2337;
            border: 1px solid #2e354f;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
            font-size: 0.8rem;
            outline: none;
        }
        .send-msg {
            background: #6c7bdb;
            border: none;
            border-radius: 40px;
            padding: 8px 22px;
            cursor: pointer;
            color: white;
            font-weight: 500;
            transition: 0.15s;
        }
        .send-msg:hover {
            background: #8a9aff;
            transform: scale(0.97);
        }
        .empty-trades {
            text-align: center;
            padding: 60px;
            color: #7a85b0;
            background: #111522;
            border-radius: 28px;
            font-size: 0.9rem;
        }
        /* MODAL окно - красивое */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111522;
            border-radius: 32px;
            padding: 28px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #f5b042;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .modal-content h3 {
            font-size: 1.5rem;
            margin-bottom: 16px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            background: #1e2337;
            border: 1px solid #2e354f;
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .modal-content textarea {
            border-radius: 20px;
            resize: vertical;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        .modal-buttons button {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        #modalCancelBtn {
            background: #2a2f48;
            color: white;
        }
        #modalSubmitBtn {
            background: #f5b042;
            color: #0b0e17;
        }

        @media (max-width: 800px) {
            .main-row { flex-direction: column; }
            .categories-sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid #1e2335; }
            .trades-section { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="trade-nav">
        <button class="trade-nav-btn active" data-mode="values">📊 Value List</button>
        <button class="trade-nav-btn" data-mode="trades">🔄 Trades & Chat</button>
    </div>
    
    <!-- Блок Value List (полностью старый интерфейс) -->
    <div id="valueListBlock">
        <div class="main-row">
            <div class="categories-sidebar">
                <div class="categories-header">📂 CATEGORIES:</div>
                <div id="categoriesList"></div>
            </div>
            <div class="main-content">
                <div class="partner-bar">
                    <div class="partner">
                        <span>partner:</span>
                        <span class="partner-creator">@Kola2_l</span>
                        <span class="partner-creator">Xmyrni_Alkogolik</span>
                    </div>
                    <div class="take-me-there">Take me there →</div>
                </div>
                <div class="control-panel">
                    <div class="search-area">
                        <input type="text" id="searchInput" placeholder="Type item name here... Search In-Page">
                    </div>
                    <div class="filter-group">
                        <select id="stabilitySelect">
                            <option value="all">Select Stability ▼</option>
                            <option value="Doing Well">Doing Well</option>
                            <option value="Stable">Stable</option>
                            <option value="Underpaid For">Underpaid For</option>
                            <option value="Overpaid For">Overpaid For</option>
                        </select>
                        <button id="filterBtn">Filter Items</button>
                        <button id="clearBtn">Clear</button>
                    </div>
                    <div class="sort-by">
                        <span>Sort by:</span>
                        <select id="sortSelect">
                            <option value="value-high">Value (High→Low)</option>
                            <option value="value-low">Value (Low→High)</option>
                        </select>
                    </div>
                </div>
                <div class="tier-section">
                    <div class="tier-title">✦ TTD Value List</div>
                    <div id="itemsGrid" class="items-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Блок Trades (отдельная кнопка, скрыт по умолчанию) -->
    <div id="tradesBlock" style="display: none;">
        <div class="trades-section">
            <div class="trades-header">
                <h2>💬 Trade Offers & Chat</h2>
                <button class="add-offer-btn" id="openOfferModalBtn">+ Add Your Offer</button>
            </div>
            <div id="tradesListContainer" class="trades-grid">
                <!-- Динамические предложения -->
            </div>
        </div>
    </div>

    <!-- Калькулятор (общий для обоих режимов) -->
    <div class="calculator-section">
        <div class="calculator-header">
            <div class="calculator-title">🧮 VALUE CALCULATOR</div>
            <button id="clearCalculatorBtn" class="clear-calc-btn">🗑️ Clear All</button>
        </div>
        <div id="calculatorItemsList" class="calculator-items">
            <div class="empty-calc">No units added. Click +1 or -1 on any unit to add to calculator.</div>
        </div>
        <div class="calculator-total">
            <span class="total-label">💰 TOTAL VALUE (Ranged):</span>
            <div>
                <span class="total-value" id="calculatorTotal">0</span>
            </div>
        </div>
    </div>
</div>

        { id: 19, name: "Laser Cameraman Car", rarity: "Legendary", rangedValue: "130-140", stability: "Overpaid For", lastChange: "+10", category: "Legendary" },
        { id: 20, name: "Titan Cinemaman", rarity: "Mythic", rangedValue: "1000-1100", stability: "Stable", lastChange: "+0", category: "Mythic" },
        { id: 21, name: "Upgraded Titan Speakerman", rarity: "Mythic", rangedValue: "1500-1600", stability: "Stable", lastChange: "+50", category: "Mythic" },
        { id: 22, name: "Upgraded Titan Cameraman", rarity: "Mythic", rangedValue: "2000-2200", stability: "Doing Well", lastChange: "+50", category: "Mythic" },
        { id: 23, name: "Speaker Spider", rarity: "Exclusive", rangedValue: "50-60", stability: "Stable", lastChange: "-5", category: "Exclusive" },
        { id: 24, name: "Camera Spider", rarity: "Exclusive", rangedValue: "150", stability: "Stable", lastChange: "+5", category: "Exclusive" },
        { id: 25, name: "Camera Repair Drone", rarity: "Exclusive", rangedValue: "300", stability: "Stable", lastChange: "+0", category: "Exclusive" },
        { id: 26, name: "Jetpack Cameraman", rarity: "Exclusive", rangedValue: "190-220", stability: "Stable", lastChange: "+5", category: "Exclusive" },
        { id: 27, name: "Titan Cameraman", rarity: "Exclusive", rangedValue: "190-200", stability: "Stable", lastChange: "+0", category: "Exclusive" },
        { id: 28, name: "Tv Woman", rarity: "Exclusive", rangedValue: "60-65", stability: "Stable", lastChange: "+0", category: "Exclusive" },
        { id: 29, name: "Scientist Cameraman", rarity: "Exclusive", rangedValue: "150-170", stability: "Doing Well", lastChange: "+5", category: "Exclusive" },
        { id: 30, name: "Large Scientist Cameraman", rarity: "Exclusive", rangedValue: "40", stability: "Stable", lastChange: "+0", category: "Exclusive" },
        { id: 31, name: "Tv Spider", rarity: "Exclusive", rangedValue: "20000+", stability: "Overpaid For", lastChange: "+1000", category: "Exclusive" },
        { id: 32, name: "Engineer Cameraman", rarity: "Exclusive", rangedValue: "13000+", stability: "Overpaid For", lastChange: "+500", category: "Exclusive" }
    ];
    const rarityOrder = ["Basic", "Uncommon", "Rare", "Epic", "Legendary", "Mythic", "Exclusive"];
    let currentCategory = "Basic";
    let calculatorItems = [];

    // ========= TRADES SYSTEM =========
    let trades = [];
    let nextTradeId = 1;

    // Load saved trades
    const savedTrades = localStorage.getItem("ttd_trades_chat");
    if (savedTrades) {
        try {
            trades = JSON.parse(savedTrades);
            nextTradeId = trades.length ? Math.max(...trades.map(t=>t.id)) + 1 : 1;
        } catch(e) {}
    } else {
        trades = [
            { id: 1, title: "🔥 LF Titan Cameraman", description: "I'm looking for Upgraded Titan Cameraman", offerDetails: "Offering Upgraded Titan Speakerman + 200 value adds", author: "@Kola2_l", createdAt: new Date().toLocaleString(), chatMessages: [{ sender: "@Kola2_l", text: "Anyone willing to trade?", time: "14:32" }] },
            { id: 2, title: "Selling TV Spider", description: "Rare exclusive unit, best offer", offerDetails: "Price: 22k value or good mythics", author: "@Xmyrni", createdAt: new Date().toLocaleString(), chatMessages: [] }
        ];
        saveTrades();
    }
    function saveTrades() { localStorage.setItem("ttd_trades_chat", JSON.stringify(trades)); }

    // Helper functions
    function getMinValue(rangedValue) {
        if (rangedValue.includes('-')) return parseInt(rangedValue.split('-')[0]);
        else if (rangedValue.includes('+')) return parseInt(rangedValue.replace('+', ''));
        else return parseInt(rangedValue);
    }
    function getMaxValue(rangedValue) {
        if (rangedValue.includes('-')) return parseInt(rangedValue.split('-')[1]);
        else if (rangedValue.includes('+')) return parseInt(rangedValue.replace('+', '')) + 500;
        else return parseInt(rangedValue);
    }

    // Calculator logic
    function updateCalculatorUI() {
        const container = document.getElementById('calculatorItemsList');
        const totalSpan = document.getElementById('calculatorTotal');
        if (calculatorItems.length === 0) {
            container.innerHTML = '<div class="empty-calc">No units added. Click +1 or -1 on any unit to add to calculator.</div>';
            totalSpan.innerText = '0';
            return;
        }
        const grouped = {};
        for (let item of calculatorItems) {
            if (!grouped[item.name]) grouped[item.name] = { count: 0, rangedValue: item.rangedValue, id: item.id };
            grouped[item.name].count++;
        }
        let html = '';
        for (let name in grouped) {
            const info = grouped[name];
            html += `<div class="calc-unit" data-id="${info.id}"><span class="calc-unit-name">${name}</span><span class="calc-unit-value">${info.rangedValue}</span><span class="calc-unit-count">x${info.count}</span><button class="remove-unit-btn" data-name="${name}">✕</button></div>`;
        }
        container.innerHTML = html;
        let totalMin = 0, totalMax = 0;
        calculatorItems.forEach(i => { totalMin += i.minVal; totalMax += i.maxVal; });
        totalSpan.innerText = totalMin === totalMax ? totalMin.toLocaleString() : `${totalMin.toLocaleString()} - ${totalMax.toLocaleString()}`;
        document.querySelectorAll('.remove-unit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const name = btn.getAttribute('data-name');
                const index = calculatorItems.findLastIndex(item => item.name === name);
                if (index !== -1) calculatorItems.splice(index, 1);
                updateCalculatorUI();
            });
        });
    }
    function addToCalculator(unitId) {
        const unit = unitsDatabase.find(u => u.id === unitId);
        if (unit) {
            calculatorItems.push({ id: unit.id, name: unit.name, rangedValue: unit.rangedValue, minVal: getMinValue(unit.rangedValue), maxVal: getMaxValue(unit.rangedValue) });
            updateCalculatorUI();
        }
    }
    function removeFromCalculator(unitId) {
        const index = calculatorItems.findLastIndex(item => item.id === unitId);
        if (index !== -1) calculatorItems.splice(index, 1);
        updateCalculatorUI();
    }

    // Value list rendering
    function renderCategories() {
        const container = document.getElementById('categoriesList');
        let html = '';
        rarityOrder.forEach(rarity => {
            html += `<div class="category-item ${currentCategory === rarity ? 'active' : ''}" data-category="${rarity}"><span class="category-icon">🐟</span><span>${rarity}</span></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.category-item').forEach(el => {
            el.addEventListener('click', () => { currentCategory = el.getAttribute('data-category'); renderCategories(); applyFiltersAndRender(); });
        });
    }
    function getFilteredItems() {
        let filtered = unitsDatabase.filter(unit => unit.category === currentCategory);
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        if (searchTerm) filtered = filtered.filter(unit => unit.name.toLowerCase().includes(searchTerm));
        const stabilityFilter = document.getElementById('stabilitySelect').value;
        if (stabilityFilter !== "all") filtered = filtered.filter(unit => unit.stability === stabilityFilter);
        const sortType = document.getElementById('sortSelect').value;
        if (sortType === "value-high") filtered.sort((a,b) => getMinValue(b.rangedValue) - getMinValue(a.rangedValue));
        else filtered.sort((a,b) => getMinValue(a.rangedValue) - getMinValue(b.rangedValue));
        return filtered;
    }
    function renderItems() {
        const filtered = getFilteredItems();
        const grid = document.getElementById('itemsGrid');
        if (!filtered.length) { grid.innerHTML = `<div class="no-results">✨ No units in ${currentCategory} category ✨</div>`; return; }
        let html = '';
        filtered.forEach(unit => {
            let stabilityClass = "";
            if (unit.stability === "Doing Well") stabilityClass = "doing-well";
            else if (unit.stability === "Stable") stabilityClass = "stable";
            else if (unit.stability === "Underpaid For") stabilityClass = "underpaid";
            else stabilityClass = "overpaid";
            html += `<div class="item-card"><div class="item-name">${unit.name}</div><div class="value-row"><span class="value-label">Value</span><div class="value-control"><button class="dec-btn" data-id="${unit.id}">-1</button><span class="current-value">${unit.rangedValue}</span><button class="inc-btn" data-id="${unit.id}">+1</button></div></div><div class="detail-row"><span class="detail-label">Stability</span><span class="detail-value"><span class="stability-badge ${stabilityClass}">${unit.stability}</span></span></div><div class="detail-row"><span class="detail-label">Rarity</span><span class="detail-value">${unit.rarity}</span></div><div class="detail-row"><span class="detail-label">Last Change</span><span class="detail-value">${unit.lastChange}</span></div></div>`;
        });
        grid.innerHTML = html;
        document.querySelectorAll('.inc-btn').forEach(btn => { btn.addEventListener('click', () => addToCalculator(parseInt(btn.dataset.id))); });
        document.querySelectorAll('.dec-btn').forEach(btn => { btn.addEventListener('click', () => removeFromCalculator(parseInt(btn.dataset.id))); });
    }
    function applyFiltersAndRender() { renderItems(); }
    function bindFilters() {
        document.getElementById('searchInput').addEventListener('input', () => applyFiltersAndRender());
        document.getElementById('filterBtn').addEventListener('click', () => applyFiltersAndRender());
        document.getElementById('clearBtn').addEventListener('click', () => { document.getElementById('searchInput').value = ''; document.getElementById('stabilitySelect').value = 'all'; document.getElementById('sortSelect').value = 'value-high'; applyFiltersAndRender(); });
        document.getElementById('sortSelect').addEventListener('change', () => applyFiltersAndRender());
        document.getElementById('clearCalculatorBtn').addEventListener('click', () => { calculatorItems = []; updateCalculatorUI(); });
    }

    // Trades rendering with chat
    function renderTrades() {
        const container = document.getElementById('tradesListContainer');
        if (!container) return;
        if (trades.length === 0) { container.innerHTML = '<div class="empty-trades">✨ No trade offers yet. Be the first to add one! ✨</div>'; return; }
        let html = '';
        trades.forEach(trade => {
            const messagesHtml = trade.chatMessages.map(m => `<div class="chat-msg"><strong>${escapeHtml(m.sender)}:</strong> ${escapeHtml(m.text)} <span style="font-size:0.6rem; opacity:0.6;">${m.time}</span></div>`).join('');
            html += `<div class="trade-card" data-trade-id="${trade.id}">
                        <div class="trade-title"><span>📢 ${escapeHtml(trade.title)}</span> <span style="font-size:0.7rem;">by ${escapeHtml(trade.author)}</span></div>
                        <div class="trade-desc">${escapeHtml(trade.description)}</div>
                        <div class="trade-meta"><span>💎 ${escapeHtml(trade.offerDetails)}</span><span>📅 ${trade.createdAt}</span></div>
                        <div class="trade-buttons">
                            <button class="chat-btn" data-id="${trade.id}">💬 Chat (${trade.chatMessages.length})</button>
                            <button class="delete-trade-btn" data-id="${trade.id}">🗑 Delete</button>
                        </div>
                        <div id="chat_${trade.id}" class="chat-window" style="display: none;">
                            <div class="chat-messages" id="msgs_${trade.id}">${messagesHtml || '<div style="color:#7a85b0;">No messages yet. Start the conversation!</div>'}</div>
                            <div class="chat-input-area">
                                <input type="text" id="chatInput_${trade.id}" placeholder="Write a message...">
                                <button class="send-msg" data-id="${trade.id}">Send</button>
                            </div>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
        trades.forEach(trade => {
            const chatBtn = document.querySelector(`.chat-btn[data-id="${trade.id}"]`);
            if (chatBtn) chatBtn.addEventListener('click', () => { const win = document.getElementById(`chat_${trade.id}`); if (win) win.style.display = win.style.display === 'none' ? 'block' : 'none'; });
            const sendBtn = document.querySelector(`.send-msg[data-id="${trade.id}"]`);
            if (sendBtn) sendBtn.addEventListener('click', () => { const input = document.getElementById(`chatInput_${trade.id}`); const msg = input.value.trim(); if (msg) { trade.chatMessages.push({ sender: "You", text: msg, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) }); saveTrades(); renderTrades(); } });
            const delBtn = document.querySelector(`.delete-trade-btn[data-id="${trade.id}"]`);
            if (delBtn) delBtn.addEventListener('click', () => { if (confirm("Delete this trade offer?")) { trades = trades.filter(t => t.id !== trade.id); saveTrades(); renderTrades(); } });
        });
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    function showAddOfferModal() {
        if (document.querySelector('.modal')) return;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3>➕ Create Trade Offer</h3><input type="text" id="modalTitle" placeholder="Offer title (e.g. LF Titan Speakerman)"><textarea id="modalDesc" rows="2" placeholder="Describe your offer..."></textarea><input type="text" id="modalDetails" placeholder="Offer details / what you give"><input type="text" id="modalAuthor" placeholder="Your nickname" value="Trader"><div class="modal-buttons"><button id="modalCancelBtn">Cancel</button><button id="modalSubmitBtn">Publish</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('modalCancelBtn').onclick = () => modalDiv.remove();
        document.getElementById('modalSubmitBtn').onclick = () => {
            const title = document.getElementById('modalTitle').value.trim();
            const desc = document.getElementById('modalDesc').value.trim();
            const details = document.getElementById('modalDetails').value.trim();
            const author = document.getElementById('modalAuthor').value.trim() || "Anonymous";
            if (!title || !desc) { alert("Please fill title and description"); return; }
            trades.unshift({ id: nextTradeId++, title, description: desc, offerDetails: details || "No specific info", author, createdAt: new Date().toLocaleString(), chatMessages: [] });
            saveTrades();
            modalDiv.remove();
            renderTrades();
        };
    }

    // Switch between modes
    function switchMode(mode) {
        const valueBlock = document.getElementById('valueListBlock');
        const tradesBlock = document.getElementById('tradesBlock');
        const btns = document.querySelectorAll('.trade-nav-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        if (mode === 'values') {
            valueBlock.style.display = 'block';
            tradesBlock.style.display = 'none';
            document.querySelector('.trade-nav-btn[data-mode="values"]').classList.add('active');
        } else {
            valueBlock.style.display = 'none';
            tradesBlock.style.display = 'block';
            document.querySelector('.trade-nav-btn[data-mode="trades"]').classList.add('active');
            renderTrades();
        }
    }

    // Initialization
    renderCategories();
    bindFilters();
    applyFiltersAndRender();
    updateCalculatorUI();
    document.querySelectorAll('.trade-nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchMode(btn.getAttribute('data-mode')));
    });
    document.getElementById('openOfferModalBtn')?.addEventListener('click', showAddOfferModal);
    switchMode('values');
</script>
</body>
</html>
