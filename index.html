        .category-item:hover {

            stabilityPlaceholder: "Select Stability ▼",
            filterBtn: "Filter Items",
            clearBtn: "Clear",
            sortLabel: "Sort by:",
            sortHigh: "Value (High→Low)",
            sortLow: "Value (Low→High)",
            tierTitle: "✦ TTD Value List",
            calcTitle: "🧮 VALUE CALCULATOR",
            clearCalc: "🗑️ Clear All",
            emptyCalc: "No units added. Click +1 on any unit to add to calculator.",
            totalLabel: "💰 TOTAL VALUE:",
            valueLabel: "Value",
            stabilityLabel: "Stability",
            rarityLabel: "Rarity",
            lastChangeLabel: "Last Change in Value",
            noResults: (cat) => `✨ No units in ${cat} category ✨`,
            doingWell: "Doing Well",
            stable: "Stable",
            underpaid: "Underpaid For",
            overpaid: "Overpaid For"
        },
        ru: {
            categoriesHeader: "📂 КАТЕГОРИИ",
            guarantors: "ГАРАНТЫ",
            partnerLabel: "партнёры:",
            takeMeThere: "Перейти →",
            searchPlaceholder: "Введите название... Поиск",
            stabilityPlaceholder: "Выберите стабильность ▼",
            filterBtn: "Фильтровать",
            clearBtn: "Сброс",
            sortLabel: "Сортировка:",
            sortHigh: "Цена (Выс→Низ)",
            sortLow: "Цена (Низ→Выс)",
            tierTitle: "✦ TTD Список Цен",
            calcTitle: "🧮 КАЛЬКУЛЯТОР ЦЕН",
            clearCalc: "🗑️ Очистить всё",
            emptyCalc: "Нет добавленных юнитов. Нажмите +1 на любом юните, чтобы добавить в калькулятор.",
            totalLabel: "💰 ОБЩАЯ СТОИМОСТЬ:",
            valueLabel: "Цена",

            noResults: (cat) => `✨ Нет юнитов в категории ${cat} ✨`,

            stable: "Стабильно",
            underpaid: "Недооценён",
            overpaid: "Переоценён"
        }
    };

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('categoriesHeader').innerText = t.categoriesHeader;
        document.getElementById('guarantorsText').innerText = t.guarantors;
        document.getElementById('partnerLabel').innerText = t.partnerLabel;
        document.getElementById('takeMeThere').innerText = t.takeMeThere;
        document.getElementById('searchInput').placeholder = t.searchPlaceholder;
        const stabilitySelect = document.getElementById('stabilitySelect');
        stabilitySelect.options[0].text = t.stabilityPlaceholder;
        document.getElementById('filterBtn').innerText = t.filterBtn;
        document.getElementById('clearBtn').innerText = t.clearBtn;
        document.getElementById('sortLabel').innerText = t.sortLabel;
        const sortSelect = document.getElementById('sortSelect');
        sortSelect.options[0].text = t.sortHigh;
        sortSelect.options[1].text = t.sortLow;
        document.getElementById('tierTitle').innerText = t.tierTitle;
        document.getElementById('calcTitle').innerText = t.calcTitle;
        document.getElementById('clearCalculatorBtn').innerText = t.clearCalc;
        document.getElementById('emptyCalcMsg').innerText = t.emptyCalc;
        document.getElementById('totalLabel').innerHTML = t.totalLabel;
        // re-render categories and items to update texts
        renderCategories();
        applyFiltersAndRender();
        updateCalculatorUI();
    }

    function getStabilityClass(stability) {
        if (stability === "Doing Well") return "doing-well";
        if (stability === "Stable") return "stable";
        if (stability === "Underpaid For") return "underpaid";
        if (stability === "Overpaid For") return "overpaid";
        return "stable";
    }

    function getStabilityLocalized(stability) {
        const t = translations[currentLang];
        if (stability === "Doing Well") return t.doingWell;
        if (stability === "Stable") return t.stable;
        if (stability === "Underpaid For") return t.underpaid;
        if (stability === "Overpaid For") return t.overpaid;
        return stability;
    }

    function getCalculatorTotal() { return calculatorItems.reduce((sum, item) => sum + item.currentValue, 0); }

    function updateCalculatorUI() {
        const container = document.getElementById('calculatorItemsList');
        const totalSpan = document.getElementById('calculatorTotal');
        if (calculatorItems.length === 0) {
            container.innerHTML = `<div class="empty-calc">${translations[currentLang].emptyCalc}</div>`;
            totalSpan.innerText = '0';
            return;
        }
        const grouped = {};
        for (let item of calculatorItems) {
            if (!grouped[item.name]) grouped[item.name] = { count: 0, totalValue: 0, items: [] };
            grouped[item.name].count++;
            grouped[item.name].totalValue += item.currentValue;
            grouped[item.name].items.push(item);
        }
        let html = '';
        for (let name in grouped) {
            const group = grouped[name];
            html += `<div class="calc-unit" data-name="${name}">
                        <span class="calc-unit-name">${name}</span>
                        <span class="calc-unit-count">x${group.count}</span>
                        <span class="calc-unit-value">💰 ${group.totalValue.toLocaleString()}</span>
                        <div class="calc-unit-controls">
                            <button class="calc-dec-btn-group" data-name="${name}">-1</button>
                            <button class="calc-inc-btn-group" data-name="${name}">+1</button>
                        </div>
                    </div>`;
        }
        container.innerHTML = html;
        totalSpan.innerText = getCalculatorTotal().toLocaleString();
        
        document.querySelectorAll('.calc-dec-btn-group').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const name = btn.getAttribute('data-name');
                const index = calculatorItems.findLastIndex(item => item.name === name);
                if (index !== -1) calculatorItems.splice(index, 1);
                updateCalculatorUI();
            });
        });
        document.querySelectorAll('.calc-inc-btn-group').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const name = btn.getAttribute('data-name');
                const unit = unitsDatabase.find(u => u.name === name);
                if (unit) { calculatorItems.push({ id: unit.id, name: unit.name, currentValue: unit.baseValue }); updateCalculatorUI(); }
            });
        });
    }

    function addToCalculator(unitId) {
        const unit = unitsDatabase.find(u => u.id === unitId);
        if (unit) { calculatorItems.push({ id: unit.id, name: unit.name, currentValue: unit.baseValue }); updateCalculatorUI(); }
    }
    function removeFromCalculator(unitId) {
        const index = calculatorItems.findLastIndex(item => item.id === unitId);
        if (index !== -1) calculatorItems.splice(index, 1);
        updateCalculatorUI();
    }
    function clearCalculator() { calculatorItems = []; updateCalculatorUI(); }
    function modifyUnitValue(unitId, delta) { if (delta === 1) addToCalculator(unitId); else if (delta === -1) removeFromCalculator(unitId); }

    function renderCategories() {
        const container = document.getElementById('categoriesList');
        let html = '';
        rarityOrder.forEach(rarity => {
            const activeClass = (currentCategory === rarity) ? 'active' : '';
            html += `<div class="category-item ${activeClass}" data-category="${rarity}"><span class="category-icon">🐟</span><span>${rarity}</span></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.category-item:not(.garant-link)').forEach(el => {
            el.addEventListener('click', () => { 
                currentCategory = el.getAttribute('data-category'); 
                renderCategories(); 
                applyFiltersAndRender(); 
            });
        });
    }

    function getFilteredItems() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const stabilityFilter = document.getElementById('stabilitySelect').value;
        const sortType = document.getElementById('sortSelect').value;
        let filtered = unitsDatabase.filter(unit => unit.category === currentCategory);
        if (searchTerm) filtered = filtered.filter(unit => unit.name.toLowerCase().includes(searchTerm));
        if (stabilityFilter !== "all") filtered = filtered.filter(unit => unit.stability === stabilityFilter);
        if (sortType === "value-high") filtered.sort((a,b) => b.baseValue - a.baseValue);
        else if (sortType === "value-low") filtered.sort((a,b) => a.baseValue - b.baseValue);
        return filtered;
    }

    function renderItems() {
        const filtered = getFilteredItems();
        const grid = document.getElementById('itemsGrid');
        const t = translations[currentLang];
        if (!filtered.length) { grid.innerHTML = `<div class="no-results">${t.noResults(currentCategory)}</div>`; return; }
        let html = '';
        filtered.forEach(unit => {
            const stabilityClass = getStabilityClass(unit.stability);
            const stabilityLocal = getStabilityLocalized(unit.stability);
            html += `<div class="item-card">
                        <div class="item-name">${unit.name}</div>
                        <div class="value-row">
                            <span class="value-label">${t.valueLabel}</span>
                            <div class="value-control">
                                <button class="dec-btn" data-id="${unit.id}">-1</button>
                                <span class="current-value">${unit.baseValue.toLocaleString()}</span>
                                <button class="inc-btn" data-id="${unit.id}">+1</button>
                            </div>
                        </div>
                        <div class="detail-row"><span class="detail-label">${t.stabilityLabel}</span><span class="detail-value"><span class="stability-badge ${stabilityClass}">${stabilityLocal}</span></span></div>
                        <div class="detail-row"><span class="detail-label">${t.rarityLabel}</span><span class="detail-value">${unit.rarity}</span></div>
                        <div class="detail-row"><span class="detail-label">${t.lastChangeLabel}</span><span class="detail-value">${unit.lastChange}</span></div>
                    </div>`;
        });
        grid.innerHTML = html;
        document.querySelectorAll('.inc-btn').forEach(btn => btn.addEventListener('click', () => modifyUnitValue(parseInt(btn.dataset.id), 1)));
        document.querySelectorAll('.dec-btn').forEach(btn => btn.addEventListener('click', () => modifyUnitValue(parseInt(btn.dataset.id), -1)));
    }

    function applyFiltersAndRender() { renderItems(); }
    
    function bindFilters() {
        document.getElementById('searchInput').addEventListener('input', () => applyFiltersAndRender());
        document.getElementById('filterBtn').addEventListener('click', () => applyFiltersAndRender());
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('stabilitySelect').value = 'all';
            document.getElementById('sortSelect').value = 'value-high';
            applyFiltersAndRender();
        });
        document.getElementById('sortSelect').addEventListener('change', () => applyFiltersAndRender());
        document.getElementById('clearCalculatorBtn').addEventListener('click', () => clearCalculator());
        
        // Language switch
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.getAttribute('data-lang');
                updateLanguage();
            });
        });
    }

    function init() {
        renderCategories();
        bindFilters();
        applyFiltersAndRender();
        updateCalculatorUI();
        updateLanguage();
    }
    
    init();
</script>
